name: Verify Overwatch Parts Against Remote Zip

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dl2
        uses: actions/checkout@v4
        with:
          ref: dl2

      - name: Install needed tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zip coreutils

      - name: Download reference ZIP and prepare parts
        env:
          ZIP_URL: "https://waifu.ayakamods.com/public.php/dav/files/obcCESBTj9Hy5oT/Overwatch%20Beta%20(COMPILED%20BUILD)%20UPDATED%204.20.26.zip" # 🔁 Replace with real URL!
        run: |
          echo "Downloading reference ZIP..."
          mkdir -p /tmp/reference_downloads
          wget -q "$ZIP_URL" -O /tmp/reference_downloads/Overwatch.zip
          
          echo "Splitting reference ZIP into 90MB parts..."
          mkdir -p /tmp/reference_parts
          
          # Using the robust loop logic provided by the user
          # Note: The original zip command was used in the user's snippet for splitting.
          # To ensure we match the checksum comparison logic, we will split and keep the naming predictable.
          (cd /tmp/reference_downloads && zip -r -s 90m ../reference_parts/Overwatch.zip .)
          
          # Rename files to a consistent format if needed for checksum consistency
          # (e.g., Overwatch.zip.z01 -> Overwatch.zip.ref.z01)
          cd /tmp/reference_parts
          for f in *; do mv "$f" "${f/Overwatch.zip/Overwatch.zip.ref}"; done
          
          echo "Created reference parts:"
          ls -lh /tmp/reference_parts/
          
          rm -rf /tmp/reference_downloads

      - name: Calculate checksums of reference parts
        run: |
          cd /tmp/reference_parts/
          echo "Calculating checksums for reference parts..."
          # Sort is important for reliable diffing
          sha256sum * | sort > /tmp/reference_parts_checksums.txt
          cat /tmp/reference_parts_checksums.txt

      - name: Copy 27 parts from dl2 and calculate checksums
        run: |
          mkdir -p /tmp/dl2_parts
          # Copying parts from the repo's downloads/ directory
          # Adjust the pattern if your dl2 files have a different naming scheme
          cp downloads/Overwatch*zip* /tmp/dl2_parts/
          
          COUNT=$(ls -1 /tmp/dl2_parts | wc -l)
          echo "Found $COUNT parts in dl2."
          
          if [ "$COUNT" -lt 27 ]; then
            echo "❌ ERROR: Expected at least 27 parts in dl2 but found $COUNT"
            exit 1
          fi

          echo "Calculating checksums for dl2 parts..."
          cd /tmp/dl2_parts
          sha256sum * | sort > /tmp/dl2_parts_checksums.txt
          cat /tmp/dl2_parts_checksums.txt

      - name: Compare checksums
        run: |
          echo "Comparing checksums..."
          # Note: This comparison assumes the filename parts are identical (excluding the .ref suffix).
          # You might need to sanitize filenames before diffing if they differ strictly by a suffix.
          
          diff --suppress-common-lines /tmp/reference_parts_checksums.txt /tmp/dl2_parts_checksums.txt > /tmp/diff_report.txt || true

          if [ -s /tmp/diff_report.txt ]; then
            echo "❌ Mismatch detected! Corrupted or missing parts found."
            cat /tmp/diff_report.txt
            exit 1
          else
            echo "✅ SUCCESS — All dl2 parts match the reference parts."
          fi

      - name: Upload checksum reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checksum-report
          path: /tmp/*checksum*.txt
