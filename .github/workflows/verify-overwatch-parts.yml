name: Verify Overwatch Parts Against Remote Zip

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dl2
        uses: actions/checkout@v4
        with:
          ref: dl2

      - name: Install needed tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget p7zip-full coreutils # coreutils for split

      - name: Download reference ZIP and split it
        env:
          ZIP_URL: "https://waifu.ayakamods.com/public.php/dav/files/obcCESBTj9Hy5oT/Overwatch%20Beta%20(COMPILED%20BUILD)%20UPDATED%204.20.26.zip"   # 🔁 Replace with real URL!
        run: |
          echo "Downloading reference ZIP..."
          wget -q "$ZIP_URL" -O /tmp/reference.zip
          echo "Reference ZIP downloaded."

          echo "Splitting reference ZIP into 90MB parts..."
          # Ensure the base name matches your parts' naming convention
          split -b 90M /tmp/reference.zip /tmp/reference_parts/ Overwatch.zip.ref.part_

          # Count how many parts were created from the reference
          REF_PART_COUNT=$(ls -1 /tmp/reference_parts/ | wc -l)
          echo "Created $REF_PART_COUNT reference parts."
          # You might want to add a check here if REF_PART_COUNT is not 27

      - name: Calculate checksums of reference parts
        run: |
          cd /tmp/reference_parts/
          echo "Calculating checksums for reference parts..."
          sha256sum * | sort | tee /tmp/reference_parts_checksums.txt

      - name: Copy 27 parts from dl2 and calculate checksums
        run: |
          mkdir -p /tmp/dl2_parts
          # Ensure this cp command correctly captures all 27 parts
          cp downloads/Overwatch*zip.z* /tmp/dl2_parts/
          echo "Files found in dl2:"
          ls -1 /tmp/dl2_parts

          COUNT=$(ls -1 /tmp/dl2_parts | wc -l)
          if [ "$COUNT" -ne 27 ]; then
            echo "❌ ERROR: Expected 27 parts in dl2 but found $COUNT"
            exit 1
          fi

          echo "Calculating checksums for dl2 parts..."
          cd /tmp/dl2_parts
          sha256sum * | sort | tee /tmp/dl2_parts_checksums.txt

      - name: Compare checksums of dl2 parts with reference parts
        run: |
          echo "Comparing checksums..."
          # Use comm to find lines (checksums) that are unique to either file
          # comm -3: Suppress common lines (lines present in both files)
          # This will show lines only in reference_parts_checksums.txt or only in dl2_parts_checksums.txt
          # If a part is corrupted in dl2, its checksum will be different, making it unique.
          # If a part is missing from dl2, it will also show up as unique.

          diff --suppress-common-lines /tmp/reference_parts_checksums.txt /tmp/dl2_parts_checksums.txt | tee /tmp/diff_report.txt

          if [ -s /tmp/diff_report.txt ]; then
            echo "❌ Mismatch detected! Corrupted or missing parts found. See diff report below."
            cat /tmp/diff_report.txt
            echo "----------------------------------------"
            echo "Detailed checksums for reference parts:"
            cat /tmp/reference_parts_checksums.txt
            echo "----------------------------------------"
            echo "Detailed checksums for dl2 parts:"
            cat /tmp/dl2_parts_checksums.txt
            echo "----------------------------------------"
            exit 1
          else
            echo "✅ SUCCESS — All dl2 parts match the reference parts."
          fi

      - name: Upload checksum reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checksum-report
          path: /tmp/*checksum*.txt
