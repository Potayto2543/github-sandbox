name: Download & Chunked Push (Remaining Files 21-27)

on:
  push:
    branches:
      - "**" # Trigger on any branch push

jobs:
  save-file-chunked-2:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Fetch full history
          ref: ${{ github.ref }}  # Ensure we are on the correct branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2
        run: sudo apt-get install -y aria2

      - name: Extract URLs and download files (Redundant, but ensures files are present)
        id: download_files
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          else
            echo "❌ No download command found in commit message. Exiting."
            exit 1
          fi

          echo "Download Mode: $MODE"
          mkdir -p downloads tmp_downloads

          IFS=' ' read -r -a urls <<< "$URL_LINE"
          for URL in "${urls[@]}"; do
            if [ -z "$URL" ]; then continue; fi
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading $URL to tmp_downloads/$FILENAME"

            aria2c \
              --split=2 \
              --max-connection-per-server=2 \
              --min-split-size=90M \
              --out="$FILENAME" \
              --dir="tmp_downloads" \
              "$URL"
          done

          if [ "$MODE" = "zip" ]; then
            echo "Processing downloaded ZIP archive..."
            ZIP_FILE=$(find tmp_downloads -maxdepth 1 -type f -name '*.zip' | head -n 1)
            if [ -n "$ZIP_FILE" ]; then
              echo "Unzipping $ZIP_FILE..."
              unzip "$ZIP_FILE" -d tmp_downloads/
              rm "$ZIP_FILE"
            else
              echo "Warning: Expected a zip file in tmp_downloads but found none."
            fi
          fi

          echo "Splitting large files into ~90MB chunks..."
          mkdir -p downloads
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ Splitting '$BASENAME' ($(( SIZE / 1024 / 1024 ))MB)..."
              PART_DIR="tmp_parts_${BASENAME}"
              mkdir -p "$PART_DIR"
              mv "$FILE" "$PART_DIR/"
              (cd "$PART_DIR" && zip -r -s 90m "../downloads/${BASENAME}.zip" .)
              rm -rf "$PART_DIR"
              echo "✅ Created parts for $BASENAME in downloads/ folder."
            else
              echo "Copying '$BASENAME' to downloads/ (under 90MB)"
              cp "$FILE" "downloads/"
            fi
          done
          rm -rf tmp_downloads

          echo "Files prepared in downloads/:"
          ls -lh downloads/

          # --- CRITICAL FOR CHUNKING THE REST ---
          # We need to identify the files NOT committed in the previous step.
          # The most reliable way is to re-list all files, then remove the ones
          # known to be in the previous commit (first 20).

          echo "Selecting remaining files (21-27) for this commit..."
          # This assumes the previous commit added files named 'Overwatch*z*' and the rest are also named similarly.
          # We get ALL files matching the pattern, then list the first 20 and *exclude* them.
          
          ALL_FILES=$(find downloads/ -maxdepth 1 -type f -name 'Overwatch*z*' | sort -V)
          
          # Get the first 20 files list from the previous step (read from file for simplicity)
          # IMPORTANT: This file must have been created by the PREVIOUS RUN of Version 1 workflow.
          # If you are running this independently, you'd need to know the exact filenames.
          if [ -f /tmp/first_20_files_list.txt ]; then
              PREVIOUS_FILES=$(cat /tmp/first_20_files_list.txt)
              
              # Build the list of remaining files
              REMAINING_FILES=""
              for f in $ALL_FILES; do
                  # Check if the file 'f' is in the PREVIOUS_FILES list
                  if ! echo "$PREVIOUS_FILES" | grep -qF "$f"; then
                      REMAINING_FILES="$REMAINING_FILES \"$f\"" # Add with quotes to handle spaces
                  fi
              done
              
              # Clean up the temporary file after reading
              rm -f /tmp/first_20_files_list.txt
              
              if [ -z "$REMAINING_FILES" ]; then
                  echo "No remaining files found to add. Previous batch may have included all files."
                  exit 0 # Exit gracefully if nothing left
              fi
          else
              echo "Error: /tmp/first_20_files_list.txt not found. Cannot determine remaining files."
              echo "Please ensure the previous workflow run (Version 1) completed and created this file."
              exit 1
          fi

          echo "Files to be added in this commit (remaining):"
          echo $REMAINING_FILES
          
          # Git add for the remaining files
          echo "Adding remaining files to Git staging area..."
          git add $REMAINING_FILES

      - name: Commit and Push Remaining Files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout $BRANCH
          git pull origin $BRANCH --rebase || echo "No existing remote branch found or pull failed, proceeding."

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            echo "Committing the remaining downloaded files..."
            git commit -m "Add remaining downloaded files (21-27) [skip ci]"

            echo "🚀 Pushing the remaining files to the 'downloads' branch..."
            # Push to the same dedicated branch
            git push origin HEAD:downloads
            echo "✅ Successfully pushed the remaining files to the 'downloads' branch."
          fi
