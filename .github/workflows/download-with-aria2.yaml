name: Download & Chunked Push (First 20 Parts)

on:
  push:
    branches:
      - "**" # Trigger on any branch push

jobs:
  save-file-chunked-1:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Fetch full history, needed for merging/rebasing
          ref: ${{ github.ref }}  # Ensure we are on the correct branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2
        run: sudo apt-get install -y aria2

      - name: Extract URLs and download files
        id: download_files # Added ID for potential future use
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          else
            echo "❌ No download command found in commit message. Exiting."
            exit 1
          fi

          echo "Download Mode: $MODE"
          mkdir -p downloads tmp_downloads

          # Handle multiple URLs if present in the URL_LINE
          IFS=' ' read -r -a urls <<< "$URL_LINE"
          for URL in "${urls[@]}"; do
            if [ -z "$URL" ]; then continue; fi # Skip empty URLs
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading $URL to tmp_downloads/$FILENAME"

            aria2c \
              --split=2 \
              --max-connection-per-server=2 \
              --min-split-size=90M \
              --out="$FILENAME" \
              --dir="tmp_downloads" \
              "$URL"
          done

          # Process downloaded files: Unzip and split if necessary
          if [ "$MODE" = "zip" ]; then
            echo "Processing downloaded ZIP archive..."
            # Assuming only one zip file if MODE is zip
            ZIP_FILE=$(find tmp_downloads -maxdepth 1 -type f -name '*.zip' | head -n 1)
            if [ -n "$ZIP_FILE" ]; then
              ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
              echo "Unzipping $ZIP_FILE..."
              unzip "$ZIP_FILE" -d tmp_downloads/ # Unzip into tmp_downloads
              rm "$ZIP_FILE" # Remove the original zip
            else
              echo "Warning: Expected a zip file in tmp_downloads but found none."
            fi
          fi

          echo "Splitting large files into ~90MB chunks..."
          mkdir -p downloads # Ensure downloads directory exists
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue # Ensure it's a file
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024)) # 90MB limit
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ Splitting '$BASENAME' ($(( SIZE / 1024 / 1024 ))MB)..."
              PART_DIR="tmp_parts_${BASENAME}"
              mkdir -p "$PART_DIR"
              mv "$FILE" "$PART_DIR/"
              
              echo "Creating zip parts for $BASENAME into 'downloads/'"

              (cd "$PART_DIR" && zip -r -s 90m "../downloads/${BASENAME}.zip" .)
              
              rm -rf "$PART_DIR" # Clean up temporary directory
              
              echo "✅ Created parts for $BASENAME in downloads/ folder."
            else
              echo "Copying '$BASENAME' to downloads/ (under 90MB)"
              cp "$FILE" "downloads/"
            fi
          done

          rm -rf tmp_downloads # Clean up temporary download directory

          echo "Files prepared in downloads/:"
          ls -lh downloads/
          
          echo "Selecting parts 21 through 27 for this commit..."
          # This command finds files starting with 'Overwatch', sorts them version-wise,
          # then skips the first 20, and takes the next 7 (21-27).
          SELECTED_FILES=$(find downloads/ -maxdepth 1 -type f -name 'Overwatch*z*' | sort -V | awk 'NR > 20 && NR <= 27' | paste -sd ' ')
          
          if [ -z "$SELECTED_FILES" ]; then
            echo "No files found matching 'Overwatch*z*' pattern for parts 21-27 to add."
            echo "Attempting to select up to 7 files from 'downloads/' directory as a fallback, starting after the first 20 files."
            # Fallback: select up to 7 files after the first 20 if the specific pattern fails
            SELECTED_FILES=$(find downloads/ -maxdepth 1 -type f | sort -V | awk 'NR > 20 && NR <= 27' | paste -sd ' ')
            if [ -z "$SELECTED_FILES" ]; then
                echo "No files found in 'downloads/' to add for the specified range. Exiting step."
                exit 0 # Exit gracefully if nothing to add
            fi
          fi

          echo "Files to be added in this commit (parts 21-27):"
          echo "$SELECTED_FILES"

          echo "$SELECTED_FILES" > /tmp/selected_files_list.txt

          echo "Adding selected files to Git staging area..."
          git add $SELECTED_FILES

      - name: Commit and Push Parts
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 1. Fetch and checkout the remote downloads branch
          git fetch origin downloads
          git checkout downloads || git checkout -b downloads

          # 2. If we were on a different branch, we need to bring the changes over.
          # Since we are likely in a CI environment, we can merge the changes 
          # from the previous checkout point if needed, or just commit directly.
          
          # 3. Commit the staged files
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            echo "Committing the selected files..."
            git commit -m "Add parts 21-27 [skip ci]"
          fi

          # 4. Pull any remote changes for the 'downloads' branch to avoid non-fast-forward
          git pull origin downloads --rebase || echo "No remote changes to rebase."

          # 5. Push to the downloads branch
          echo "🚀 Pushing files to the 'downloads' branch..."
          git push origin downloads
          echo "✅ Successfully pushed to the 'downloads' branch."
