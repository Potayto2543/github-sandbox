name: Download & Chunked Push (First 20 Parts to dl1, Rest to dl2)

on:
  workflow_dispatch: # Allows manual triggering

jobs:
  save-file-chunked:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Fetch full history, needed for merging/rebasing
          token: ${{ secrets.GITHUB_TOKEN }} # Use the default GitHub Actions token

      - name: Install aria2, unzip, zip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 unzip zip

      - name: Download, extract, and chunk (GENERATE ONCE)
        id: generate_files # Give this step an ID
        run: |
          set -euo pipefail # Exit immediately if a command exits with a non-zero status, or if an unset variable is used.

          # --- Clean workspace ---
          echo "Cleaning workspace..."
          rm -rf downloads tmp_downloads tmp_parts_*
          mkdir -p downloads tmp_downloads
          echo "Workspace cleaned."

          # --- Get download URL from commit message ---
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          URL_LINE=""
          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
            echo "Download Mode: ZIP Archive expected"
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
            echo "Download Mode: Direct URLs expected"
          else
            echo "❌ No download command ('download:' or 'download-zip:') found in commit message. Exiting."
            exit 1
          fi

          # --- Download files ---
          echo "Starting downloads..."
          IFS=' ' read -r -a urls <<< "$URL_LINE"
          for URL in "${urls[@]}"; do
            if [ -z "$URL" ]; then continue; fi # Skip empty URLs
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading '$URL' to 'tmp_downloads/$FILENAME'"
            aria2c \
              --split=2 \
              --max-connection-per-server=2 \
              --min-split-size=90M \
              --out="$FILENAME" \
              --dir="tmp_downloads" \
              "$URL"
          done
          echo "Downloads complete."

          # --- Process downloaded ZIP archive if applicable ---
          if [ "$MODE" = "zip" ]; then
            echo "Processing downloaded ZIP archive..."
            ZIP_FILE=$(find tmp_downloads -maxdepth 1 -type f -name '*.zip' | head -n 1)
            if [ -n "$ZIP_FILE" ]; then
              echo "Unzipping '$ZIP_FILE' into 'tmp_downloads/'..."
              unzip -o "$ZIP_FILE" -d tmp_downloads/ # -o to overwrite if needed
              rm -f "$ZIP_FILE" # Remove the original zip file
              echo "Unzipping complete."
            else
              echo "⚠️ Warning: Expected a .zip file in 'tmp_downloads/' but found none. Continuing with other files if any."
            fi
          fi

          # --- Split large files into ~90MB chunks if needed ---
          echo "Splitting large files into ~90MB chunks..."
          for FILE in tmp_downloads/*; do
            if [ ! -f "$FILE" ]; then continue; fi # Skip directories or non-files

            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024)) # 90MB limit
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ Splitting '$BASENAME' ($(( SIZE / 1024 / 1024 ))MB)..."
              PART_DIR="tmp_parts_${BASENAME}_$$" # Use PID for uniqueness
              mkdir -p "$PART_DIR"
              mv "$FILE" "$PART_DIR/" # Move original to temp dir for splitting

              echo "Creating zip parts for '$BASENAME' into 'downloads/' (split size ~90MB)..."
              # The zip command will create files like: <basename>.zip.001, <basename>.zip.002, etc.
              # Or, if it's the first time and not resuming, it might create .z01, .z02
              # We will rely on `sort -V` to order them correctly later.
              (cd "$PART_DIR" && zip -r -s 90m "../downloads/${BASENAME}.zip" .)

              rm -rf "$PART_DIR" # Clean up temporary directory
              echo "✅ Created parts for '$BASENAME' in 'downloads/' folder."
            else
              echo "Copying '$BASENAME' to 'downloads/' (under 90MB)"
              cp -f "$FILE" "downloads/" # Copy smaller files directly
            fi
          done
          rm -rf tmp_downloads # Clean up temporary download directory

          echo "All files prepared in 'downloads/':"
          ls -lh downloads/

          # --- Select files based on their final names ---
          echo "Selecting files for commits..."
          # This glob tries to match .z01 to .z26 and the final .zip,
          # or .zip.001 to .zip.026 and final .zip if zip -s created those.
          # `sort -V` is crucial for version/numeric sorting of parts.
          mapfile -t ALL_FILES_IN_ORDER < <(find downloads/ -maxdepth 1 -type f \( -name '*.z*' -o -name '*.zip' \) | sort -V)

          if [ "${#ALL_FILES_IN_ORDER[@]}" -lt 27 ]; then
            echo "❌ Error: Expected at least 27 part files (e.g., .z01 to .z26 and .zip, or .zip.001 to .zip.027), but found only ${#ALL_FILES_IN_ORDER[@]}."
            echo "Files found in 'downloads/':"
            printf ' - %s\n' "${ALL_FILES_IN_ORDER[@]}"
            exit 1
          fi

          # Split into two groups: first 20 for dl1, next 7 for dl2
          PARTS_DL1=("${ALL_FILES_IN_ORDER[@]:0:20}")   # Selects first 20 files (index 0 to 19)
          PARTS_DL2=("${ALL_FILES_IN_ORDER[@]:20:7}")   # Selects next 7 files (index 20 to 26)

          echo "Files for dl1 (parts 1-20):"
          printf ' - %s\n' "${PARTS_DL1[@]}"
          echo "Files for dl2 (parts 21-27):"
          printf ' - %s\n' "${PARTS_DL2[@]}"

          # Store the selected files for the next step
          echo "### DL1_FILES_TO_ADD ###" > /tmp/commit_files_list.txt
          printf '%s\n' "${PARTS_DL1[@]}" >> /tmp/commit_files_list.txt
          echo "### DL2_FILES_TO_ADD ###" >> /tmp/commit_files_list.txt
          printf '%s\n' "${PARTS_DL2[@]}" >> /tmp/commit_files_list.txt
          echo "File lists generated for commits."

          - name: Commit and Push to dl1 and dl2
          run: |
            set -euo pipefail

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            # --- Prepare for the first commit (dl1) ---
            echo "Preparing to commit to dl1..."
            if git show-ref --verify --quiet refs/remotes/origin/dl1; then
              echo "Branch 'dl1' exists remotely. Checking out and pulling."
              git checkout -B dl1 origin/dl1
            else
              echo "Branch 'dl1' does not exist remotely. Creating new local branch 'dl1'."
              git checkout -B dl1
            fi

            DL1_FILES=( $(grep "### DL1_FILES_TO_ADD ###" /tmp/commit_files_list.txt -A 20 \
              | grep -v "###" | grep -v "DL1_FILES_TO_ADD" || true) )

            if [ "${#DL1_FILES[@]}" -gt 0 ]; then
              git add -f -- "${DL1_FILES[@]}"
            else
              echo "No files to add for dl1 (DL1_FILES_TO_ADD list was empty)."
            fi

            if ! git diff --cached --quiet; then
              echo "Committing parts 1-20 to dl1..."
              git commit -m "Add parts 1-20 [skip ci]"
              echo "Pushing dl1..."
              git push -f origin dl1
            else
              echo "No changes found for dl1. Skipping commit and push."
            fi
        
            # --- Prepare for the second commit (dl2) ---
            echo "Preparing to commit to dl2..."
            git reset --hard HEAD
        
            if git show-ref --verify --quiet refs/remotes/origin/dl2; then
              echo "Branch 'dl2' exists remotely. Checking out and pulling."
              git checkout -B dl2 origin/dl2
            else
              echo "Branch 'dl2' does not exist remotely. Creating new local branch 'dl2'."
              git checkout -B dl2
            fi
        
            DL2_FILES=( $(grep "### DL2_FILES_TO_ADD ###" /tmp/commit_files_list.txt -A 7 \
              | grep -v "###" | grep -v "DL2_FILES_TO_ADD" || true) )
        
            if [ "${#DL2_FILES[@]}" -gt 0 ]; then
              git add -f -- "${DL2_FILES[@]}"
            else
              echo "No files to add for dl2 (DL2_FILES_TO_ADD list was empty)."
            fi
        
            if ! git diff --cached --quiet; then
              echo "Committing parts 21-27 to dl2..."
              git commit -m "Add parts 21-27 [skip ci]"
              echo "Pushing dl2..."
              git push -f origin dl2
            else
              echo "No changes found for dl2. Skipping commit and push."
            fi
        
              echo "All commits and pushes completed."
